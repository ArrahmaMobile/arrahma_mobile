name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'scraper-nodejs/**'
      - '!scraper-nodejs/**/*.md'

concurrency:
  group: deploy-arrahmah
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: d10100111001/arrahmah-api
  APP_NAME: arrahmah
  APP_PORT: 8888

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./scraper-nodejs
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/platform/apps/${{ env.APP_NAME }}

            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            docker compose up -d --force-recreate --no-build

            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if docker compose exec -T ${{ env.APP_NAME }} node -e \
                "fetch('http://localhost:${{ env.APP_PORT }}/health').then(r=>{if(!r.ok)throw 1})" 2>/dev/null; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed"
                docker compose logs --tail=50 ${{ env.APP_NAME }}
                exit 1
              fi
              sleep 2
            done

            docker image prune -f
