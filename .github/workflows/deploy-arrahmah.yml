name: Deploy Arrahmah

on:
  push:
    branches: [master]
    paths:
      - 'scraper-nodejs/**'
      - '.github/workflows/deploy-arrahmah.yml'
      - '!scraper-nodejs/**/*.md'

concurrency:
  group: deploy-arrahmah
  cancel-in-progress: false

env:
  APP_NAME: arrahmah
  APP_PORT: 8888

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/opt/platform/apps/${{ env.APP_NAME }}"
            BUILD_DIR="/tmp/arrahmah-build-${{ github.sha }}"

            # Clone at the exact commit
            rm -rf "$BUILD_DIR"
            git clone --depth 1 --branch master https://github.com/${{ github.repository }}.git "$BUILD_DIR"

            # Build Docker image
            echo "Building arrahmah-api image..."
            docker build -t arrahmah-api:latest "$BUILD_DIR/scraper-nodejs"
            echo "Image built successfully"

            # Deploy
            cd "$APP_DIR"
            docker compose up -d --force-recreate --no-build

            # Health check
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if docker compose exec -T ${{ env.APP_NAME }} node -e \
                "fetch('http://localhost:${{ env.APP_PORT }}/health').then(r=>{if(!r.ok)throw 1})" 2>/dev/null; then
                echo "Health check passed"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "Health check failed"
                docker compose logs --tail=50 ${{ env.APP_NAME }}
                exit 1
              fi
              sleep 2
            done

            # Cleanup
            rm -rf "$BUILD_DIR"
            docker image prune -f
